apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels:
    app: fastapi-gateway
    app.kubernetes.io/name: fastapi-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: fastapi-gateway
  template:
    metadata:
      labels:
        app: fastapi-gateway
        app.kubernetes.io/name: fastapi-gateway
    spec:
      serviceAccountName: {{ .Release.Name }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      volumes:
        - name: tenants-config
          configMap:
            name: {{ .Values.tenantsConfigMap.name }}
            items:
              - key: {{ .Values.tenantsConfigMap.key }}
                path: tenants.yaml
      containers:
        - name: gateway
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          envFrom:
            - secretRef:
                name: {{ .Values.tenantKeysSecret.name }}
          env:
            - name: ROUTER_URL
              value: "{{ .Values.router.url }}"
            - name: TENANTS_PATH
              value: "{{ .Values.tenantsConfigMap.mountPath }}/tenants.yaml"
          volumeMounts:
            - name: tenants-config
              mountPath: {{ .Values.tenantsConfigMap.mountPath }}
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
