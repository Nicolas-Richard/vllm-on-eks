apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}
  labels:
    app: fastapi-gateway
    app.kubernetes.io/name: fastapi-gateway
spec:
  type: {{ .Values.service.type }}
  selector:
    app: fastapi-gateway
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
