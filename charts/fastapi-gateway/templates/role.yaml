{{- if .Values.workerWatcher.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Release.Name }}-endpointslice-reader
  namespace: {{ .Values.workerWatcher.namespace }}
  labels:
    app: fastapi-gateway
    app.kubernetes.io/name: fastapi-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
{{- end }}
