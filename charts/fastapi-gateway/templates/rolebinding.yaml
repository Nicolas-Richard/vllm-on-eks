{{- if .Values.workerWatcher.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Release.Name }}-endpointslice-reader
  namespace: {{ .Values.workerWatcher.namespace }}
  labels:
    app: fastapi-gateway
    app.kubernetes.io/name: fastapi-gateway
    app.kubernetes.io/instance: {{ .Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ .Release.Name }}-endpointslice-reader
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}
    namespace: {{ .Release.Namespace }}
{{- end }}
